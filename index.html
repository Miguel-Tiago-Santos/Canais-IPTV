<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>IPTV Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
    html,body{margin:0;height:100%;background:#000;overflow:hidden;font-family:Arial,sans-serif;}
    #app{height:100vh;width:100vw;position:relative;}
    video{width:100vw;height:100vh;object-fit:contain;background:#000;}
    #sidebar{
        position:absolute;left:0;top:0;width:340px;height:100vh;
        background:rgba(17,17,17,0.97);color:white;overflow-y:auto;
        transform:translateX(-100%);transition:transform .35s;z-index:50;
    }
    #app:hover #sidebar{transform:translateX(0);}
    #sidebar h2{margin:0;padding:15px;background:#1c1c1c;}
    .channel{padding:14px;cursor:pointer;border-bottom:1px solid #222;}
    .channel:hover{background:#333;}
    .channel.active{background:#0078d7;}
    #status{
        position:absolute;top:20px;left:370px;background:rgba(0,0,0,0.9);
        color:white;padding:12px 18px;border-radius:8px;z-index:70;
    }
    #controls{
        position:absolute;top:20px;right:20px;display:flex;gap:8px;z-index:75;
    }
    button, #proxyInfo{
        background:rgba(0,0,0,0.8);color:#0f0;padding:8px 14px;
        border:none;border-radius:6px;cursor:pointer;font-size:13px;
    }
    button:hover{background:rgba(0,0,0,0.95);}
    #soundBtn{
        position:absolute;bottom:30px;right:30px;padding:14px 24px;
        font-size:18px;background:#0078d7;color:white;border:none;
        border-radius:8px;cursor:pointer;display:none;z-index:80;
    }
</style>
</head>
<body>

<div id="app">
    <div id="sidebar">
        <h2>Canais IPTV</h2>
        <div id="channels"></div>
    </div>

    <div id="player">
        <div id="status">A carregar RTP 1...</div>
        <div id="controls">
            <div id="proxyInfo">Direct</div>
            <button onclick="toggleMode()">Alternar Modo</button>
        </div>
        <video id="video" autoplay playsinline controls></video>
        <button id="soundBtn">🔊 Ativar Som</button>
    </div>
</div>

<script>
// ==================== MELHOR CONFIGURAÇÃO POSSÍVEL ====================
const PROXIES = [
    "https://api.codetabs.com/v1/proxy?quest=",
    "https://allorigins.win/raw?url=",
    "https://cors.lol/?url=",
    "https://corsproxy.io/?",
    "https://proxy.cors.sh/"
];

let currentProxy = 0;
let useProxy = false;

const playlistText = `
#EXTM3U
#EXTINF:-1,RTP 1
https://streaming-live.rtp.pt/liverepeater/smil:rtp1HD.smil/playlist.m3u8
#EXTINF:-1,RTP 2
https://streaming-live.rtp.pt/liverepeater/rtp2HD.smil/playlist.m3u8
#EXTINF:-1,RTP Notícias
https://streaming-live.rtp.pt/liverepeater/smil:rtpnHD.smil/playlist.m3u8
#EXTINF:-1,RTP Memória
https://streaming-live.rtp.pt/liverepeater/rtpmem.smil/playlist.m3u8
#EXTINF:-1,SIC
https://d1zx6l1dn8vaj5.cloudfront.net/out/v1/b89cc37caa6d418eb423cf092a2ef970/index.m3u8
#EXTINF:-1,SIC Notícias
https://sicnot.live.impresa.pt/sicnot.m3u8
`;

const video = document.getElementById("video");
const statusDiv = document.getElementById("status");
const soundBtn = document.getElementById("soundBtn");
const proxyInfo = document.getElementById("proxyInfo");

let hls = null;
let channels = parseM3U(playlistText);

renderChannels();
playChannel(channels[0]);

function getUrl(url) {
    if (!useProxy) return url;
    let proxy = PROXIES[currentProxy];
    if (proxy.includes("corsproxy.io")) {
        return proxy + encodeURIComponent(url);
    }
    return proxy + encodeURIComponent(url);
}

function updateInfo() {
    proxyInfo.textContent = useProxy ? `Proxy ${currentProxy+1}/${PROXIES.length}` : "Direct";
    proxyInfo.style.color = useProxy ? "#0f0" : "#ff0";
}

function toggleMode() {
    useProxy = !useProxy;
    if (useProxy) currentProxy = (currentProxy + 1) % PROXIES.length;
    updateInfo();
    reloadCurrentChannel();
}

function parseM3U(text) {
    const lines = text.trim().split('\n');
    const result = [];
    let name = "Canal";
    for (let line of lines) {
        line = line.trim();
        if (line.startsWith("#EXTINF")) name = line.split(',').pop().trim();
        else if (line.startsWith("http")) result.push({name, url: line});
    }
    return result;
}

function renderChannels() {
    const container = document.getElementById("channels");
    container.innerHTML = "";
    channels.forEach(ch => {
        const div = document.createElement("div");
        div.className = "channel";
        div.textContent = ch.name;
        div.onclick = () => playChannel(ch);
        container.appendChild(div);
    });
}

function reloadCurrentChannel() {
    const active = document.querySelector(".channel.active");
    if (active) {
        const ch = channels.find(c => c.name === active.textContent);
        if (ch) playChannel(ch);
    }
}

function playChannel(channel) {
    document.querySelectorAll(".channel").forEach(el => el.classList.toggle("active", el.textContent === channel.name));

    statusDiv.style.display = "block";
    statusDiv.textContent = `A carregar ${channel.name}...`;

    if (hls) { hls.destroy(); hls = null; }
    video.pause();
    video.src = "";

    const finalUrl = getUrl(channel.url);

    if (Hls.isSupported()) {
        hls = new Hls({ xhrSetup: xhr => xhr.withCredentials = false });
        hls.loadSource(finalUrl);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            video.play().catch(() => {});
            statusDiv.style.display = "none";
        });

        hls.on(Hls.Events.ERROR, () => {
            statusDiv.textContent = "Erro - Tente Alternar Modo";
        });
    } else {
        video.src = finalUrl;
    }
}

soundBtn.onclick = () => {
    video.muted = false;
    video.volume = 1;
    soundBtn.style.display = "none";
};

updateInfo();
</script>
</body>
</html>
