<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
    font-family:Arial;
}

#app{
    width:100vw;
    height:100vh;
    position:relative;
    background:#000;
}

video, iframe{
    width:100vw;
    height:100vh;
    border:0;
    background:#000;
}

#sidebar{
    position:absolute;
    left:0;
    top:0;
    width:340px;
    max-width:85vw;
    height:100vh;
    background:rgba(17,17,17,.96);
    color:white;
    overflow-y:auto;
    z-index:100;
    transform:translateX(-100%);
    transition:.25s;
}

#sidebar.open{
    transform:translateX(0);
}

#sidebar h2{
    margin:0;
    padding:15px;
    background:#1c1c1c;
}

.channel{
    padding:16px;
    border-bottom:1px solid #222;
    cursor:pointer;
    font-size:18px;
}

.channel.active{
    background:#0078d7;
}

#menuBtn{
    position:absolute;
    top:20px;
    right:20px;
    z-index:300;
    background:#0078d7;
    color:white;
    border:0;
    border-radius:8px;
    padding:12px 16px;
    font-size:20px;
}

#status{
    position:absolute;
    top:20px;
    left:20px;
    right:80px;
    background:rgba(0,0,0,.85);
    color:white;
    padding:12px 18px;
    border-radius:8px;
    z-index:200;
}
</style>
</head>

<body>

<div id="app">

    <video id="video" autoplay muted playsinline webkit-playsinline></video>

    <iframe
        id="iframePlayer"
        allow="autoplay; fullscreen"
        allowfullscreen
        style="display:none;">
    </iframe>

    <div id="sidebar">
        <h2>Canais</h2>
        <div id="channels"></div>
    </div>

    <div id="status">A carregar...</div>
    <button id="menuBtn">☰</button>

</div>

<script>
const playlist = [
    {
        name:"RTP 1",
        type:"iframe",
        url:"https://www.rtp.pt/play/direto/rtp1"
    },
    {
        name:"RTP 2",
        type:"iframe",
        url:"https://www.rtp.pt/play/direto/rtp2"
    },
    {
        name:"RTP Notícias",
        type:"iframe",
        url:"https://www.rtp.pt/play/direto/rtp3"
    },
    {
        name:"RTP Memória",
        type:"iframe",
        url:"https://www.rtp.pt/play/direto/rtpmemoria"
    },
    {
        name:"RTP Mundo",
        type:"iframe",
        url:"https://www.rtp.pt/play/direto/rtpinternacional"
    },
    {
        name:"RTP Madeira",
        type:"iframe",
        url:"https://www.rtp.pt/play/direto/rtpmadeira"
    },
    {
        name:"RTP Açores",
        type:"iframe",
        url:"https://www.rtp.pt/play/direto/rtpacores"
    },
    {
        name:"RTP África",
        type:"iframe",
        url:"https://www.rtp.pt/play/direto/rtpafrica"
    },
    {
        name:"RTP ZigZag",
        type:"iframe",
        url:"https://www.rtp.pt/play/zigzag/direto/tv"
    },
    {
        name:"SIC",
        type:"hls",
        url:"https://d1zx6l1dn8vaj5.cloudfront.net/out/v1/b89cc37caa6d418eb423cf092a2ef970/index.m3u8"
    },
    {
        name:"TVI",
        type:"hls",
        url:"https://raw.githubusercontent.com/thomraider12/canaistvpt/main/m3u8s/tvi.m3u8"
    },
    {
        name:"Porto Canal",
        type:"hls",
        url:"https://pull-live-156-1.global.ssl.fastly.net/pc5865dc25400thmb-ea6bf03b14fa318f7133/smil:pc1-jhrgyuoqe5865db-68tkgb14fa318f7133f03.smil/playlist.m3u8"
    },
    {
        name:"ARTV",
        type:"hls",
        url:"https://playout175.livextend.cloud/livenlin4/_definst_/2liveartvpub2/playlist.m3u8"
    },
    {
        name:"Euronews PT",
        type:"hls",
        url:"https://38cf202f635c4e6d9a9ecd1dc805222a.mediatailor.eu-west-1.amazonaws.com/v1/manifest/0547f18649bd788bec7b67b746e47670f558b6b2/production-LiveChannel-6572/aa7d84c5-ed1b-4706-aa89-11c525faf07d/5.m3u8"
    }
];

const video = document.getElementById("video");
const iframePlayer = document.getElementById("iframePlayer");
const channelsDiv = document.getElementById("channels");
const sidebar = document.getElementById("sidebar");
const menuBtn = document.getElementById("menuBtn");
const statusDiv = document.getElementById("status");

let hls = null;

renderChannels();
playChannel(playlist[0]);

menuBtn.onclick = () => {
    sidebar.classList.toggle("open");
};

function renderChannels(){
    channelsDiv.innerHTML = "";

    playlist.forEach(channel => {
        const div = document.createElement("div");
        div.className = "channel";
        div.textContent = channel.name;
        div.onclick = () => {
            sidebar.classList.remove("open");
            playChannel(channel);
        };
        channelsDiv.appendChild(div);
    });
}

function setActive(name){
    document.querySelectorAll(".channel").forEach(el => {
        el.classList.toggle("active", el.textContent === name);
    });
}

function playChannel(channel){
    setActive(channel.name);

    statusDiv.style.display = "block";
    statusDiv.textContent = "A carregar: " + channel.name;

    if(hls){
        hls.destroy();
        hls = null;
    }

    video.pause();
    video.removeAttribute("src");
    video.style.display = "none";

    iframePlayer.src = "about:blank";
    iframePlayer.style.display = "none";

    if(channel.type === "iframe"){
        iframePlayer.style.display = "block";
        iframePlayer.src = channel.url;
        statusDiv.style.display = "none";
        goFullscreen();
        return;
    }

    video.style.display = "block";
    video.muted = true;
    video.volume = 0;

    if(Hls.isSupported()){
        hls = new Hls({
            enableWorker:false,
            lowLatencyMode:false
        });

        hls.loadSource(channel.url);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            video.play().then(() => {
                statusDiv.style.display = "none";
                goFullscreen();
            }).catch(() => {
                statusDiv.textContent = "Toque no ecrã para iniciar.";
            });
        });

        hls.on(Hls.Events.ERROR, function(event, data){
            if(data.fatal){
                statusDiv.textContent = "Erro neste canal.";
            }
        });

    } else {
        video.src = channel.url;
        video.play().then(() => {
            statusDiv.style.display = "none";
            goFullscreen();
        }).catch(() => {
            statusDiv.textContent = "Toque no ecrã para iniciar.";
        });
    }
}

function goFullscreen(){
    const el = document.documentElement;

    if(el.requestFullscreen && !document.fullscreenElement){
        el.requestFullscreen().catch(()=>{});
    } else if(el.webkitRequestFullscreen){
        try{ el.webkitRequestFullscreen(); }catch(e){}
    }
}

document.body.addEventListener("click", () => {
    goFullscreen();
    if(video.style.display !== "none" && video.paused){
        video.play().catch(()=>{});
    }
});

document.body.addEventListener("touchstart", () => {
    goFullscreen();
    if(video.style.display !== "none" && video.paused){
        video.play().catch(()=>{});
    }
}, {passive:true});
</script>

</body>
</html>
