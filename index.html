<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>IPTV Player Android WebView</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
    font-family:Arial, sans-serif;
    touch-action:manipulation;
}

#app{
    width:100vw;
    height:100vh;
    position:relative;
    background:#000;
    overflow:hidden;
}

video{
    position:absolute;
    inset:0;
    width:100vw;
    height:100vh;
    object-fit:contain;
    background:#000;
}

#sidebar{
    position:absolute;
    left:0;
    top:0;
    width:340px;
    max-width:85vw;
    height:100vh;
    background:rgba(17,17,17,.96);
    color:white;
    overflow-y:auto;
    z-index:100;
    transform:translateX(-100%);
    transition:.25s;
}

#sidebar.open{
    transform:translateX(0);
}

#sidebar h2{
    margin:0;
    padding:15px;
    background:#1c1c1c;
}

.channel{
    padding:16px;
    border-bottom:1px solid #222;
    cursor:pointer;
    font-size:18px;
}

.channel.active{
    background:#0078d7;
}

#status{
    position:absolute;
    top:20px;
    left:20px;
    right:20px;
    background:rgba(0,0,0,.85);
    color:white;
    padding:12px 18px;
    border-radius:8px;
    z-index:200;
    font-size:16px;
}

#menuBtn{
    position:absolute;
    top:20px;
    right:20px;
    z-index:300;
    background:rgba(0,120,215,.95);
    color:white;
    border:0;
    border-radius:8px;
    padding:12px 16px;
    font-size:18px;
}

#soundBtn{
    position:absolute;
    bottom:30px;
    right:30px;
    padding:14px 24px;
    font-size:18px;
    background:#0078d7;
    color:white;
    border:0;
    border-radius:8px;
    cursor:pointer;
    display:none;
    z-index:300;
}
</style>
</head>

<body>
<div id="app">
    <video id="video" autoplay muted playsinline webkit-playsinline preload="auto"></video>

    <div id="sidebar">
        <h2>Canais</h2>
        <div id="channels"></div>
    </div>

    <div id="status">A carregar...</div>
    <button id="menuBtn">☰</button>
    <button id="soundBtn">🔊 Ativar Som</button>
</div>

<script>
const playlist = [

        ]

    {

        ]
    },
    {

            "https://streaming-live.rtp.pt/liverepeater/smil:rtpmem.smil/playlist.m3u8",

        ]
    },
    {
        name:"RTP Mundo",
        urls:[

        ]
    },
    {
        name:"RTP Madeira",
        urls:[
            "https://streaming-live.rtp.pt/liverepeater/smil:rtpmadeira.smil/playlist.m3u8",
            "https://streaming-live.rtp.pt/liverepeater/smil:rtpmadeiraHD.smil/playlist.m3u8"
        ]
    },
    {
        name:"RTP Açores",
        urls:[
            "https://streaming-live.rtp.pt/liverepeater/smil:rtpacoresHD.smil/playlist.m3u8",
            "https://streaming-live.rtp.pt/liverepeater/smil:rtpacores.smil/playlist.m3u8"
        ]
    },
    {
        name:"RTP África",
        urls:[
            "https://streaming-live.rtp.pt/liverepeater/smil:rtpafrica.smil/playlist.m3u8",
            "https://streaming-live.rtp.pt/liverepeater/smil:rtpafricaHD.smil/playlist.m3u8"
        ]
    },
    {
        name:"RTP ZigZag",
        urls:[
            "https://streaming-live.rtp.pt/liverepeater/smil:zigzag.smil/playlist.m3u8",
            "https://streaming-live.rtp.pt/liverepeater/smil:zigzagHD.smil/playlist.m3u8",
            "https://streaming-live.rtp.pt/liverepeater/smil:rtpzigzag.smil/playlist.m3u8"
        ]
    },
    {
        name:"SIC",
        urls:["https://d1zx6l1dn8vaj5.cloudfront.net/out/v1/b89cc37caa6d418eb423cf092a2ef970/index.m3u8"]
    },
    {
        name:"TVI",
        urls:["https://raw.githubusercontent.com/thomraider12/canaistvpt/main/m3u8s/tvi.m3u8"]
    },
    {
        name:"Porto Canal",
        urls:["https://pull-live-156-1.global.ssl.fastly.net/pc5865dc25400thmb-ea6bf03b14fa318f7133/smil:pc1-jhrgyuoqe5865db-68tkgb14fa318f7133f03.smil/playlist.m3u8"]
    },
    {
        name:"ARTV",
        urls:["https://playout175.livextend.cloud/livenlin4/_definst_/2liveartvpub2/playlist.m3u8"]
    },
    {
        name:"Euronews PT",
        urls:["https://38cf202f635c4e6d9a9ecd1dc805222a.mediatailor.eu-west-1.amazonaws.com/v1/manifest/0547f18649bd788bec7b67b746e47670f558b6b2/production-LiveChannel-6572/aa7d84c5-ed1b-4706-aa89-11c525faf07d/5.m3u8"]
    },
    {
        name:"FUEL TV Europe",
        urls:["https://amg01074-fueltv-fueltvemeaen-rakuten-b6j62.amagi.tv/hls/amagi_hls_data_rakutenAA-fueltvemeaen/CDN/master.m3u8"]
    },
    {
        name:"TDM Macau PT",
        urls:["https://globallive.tdm.com.mo/ch2/ch2.live/playlist.m3u8"]
    },
    {
        name:"TV Cultura",
        urls:["https://player-tvcultura.stream.uol.com.br/live/tvcultura.m3u8"]
    }
];

const video = document.getElementById("video");
const channelsDiv = document.getElementById("channels");
const statusDiv = document.getElementById("status");
const soundBtn = document.getElementById("soundBtn");
const sidebar = document.getElementById("sidebar");
const menuBtn = document.getElementById("menuBtn");

let hls = null;
let currentChannel = null;
let currentUrlIndex = 0;

renderChannels();
playChannel(playlist[0]);

menuBtn.onclick = function(){
    sidebar.classList.toggle("open");
};

function renderChannels(){
    channelsDiv.innerHTML = "";

    playlist.forEach(channel => {
        const div = document.createElement("div");
        div.className = "channel";
        div.textContent = channel.name;
        div.onclick = () => {
            sidebar.classList.remove("open");
            playChannel(channel);
        };
        channelsDiv.appendChild(div);
    });
}

function setActive(name){
    document.querySelectorAll(".channel").forEach(el => {
        el.classList.toggle("active", el.textContent === name);
    });
}

function playChannel(channel){
    currentChannel = channel;
    currentUrlIndex = 0;
    setActive(channel.name);
    loadUrl(channel.urls[currentUrlIndex]);
}

function loadUrl(url){
    statusDiv.style.display = "block";
    statusDiv.textContent = "A carregar: " + currentChannel.name;

    soundBtn.style.display = "none";

    if(hls){
        hls.destroy();
        hls = null;
    }

    video.pause();
    video.removeAttribute("src");
    video.load();

    // Autoplay em Android WebView só é fiável em mute
    video.muted = true;
    video.volume = 0;

    if(window.Hls && Hls.isSupported()){
        hls = new Hls({
            enableWorker:false,
            lowLatencyMode:false,
            backBufferLength:30,
            maxBufferLength:30,
            manifestLoadingTimeOut:15000,
            levelLoadingTimeOut:15000,
            fragLoadingTimeOut:20000
        });

        hls.loadSource(url);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, startVideo);

        hls.on(Hls.Events.ERROR, function(event, data){
            if(data && data.fatal){
                tryNextUrl();
            }
        });
    } else {
        video.src = url;
        video.addEventListener("loadedmetadata", startVideo, {once:true});
        video.addEventListener("error", tryNextUrl, {once:true});
    }
}

function tryNextUrl(){
    currentUrlIndex++;

    if(currentChannel && currentUrlIndex < currentChannel.urls.length){
        statusDiv.textContent = "A tentar alternativa: " + currentChannel.name;
        loadUrl(currentChannel.urls[currentUrlIndex]);
    } else {
        statusDiv.style.display = "block";
        statusDiv.textContent = "Erro neste canal ou stream sem playlist.";
    }
}

function startVideo(){
    video.play()
    .then(() => {
        statusDiv.style.display = "none";
        keepFullscreenLike();
    })
    .catch(() => {
        statusDiv.style.display = "block";
        statusDiv.textContent = "Autoplay bloqueado. Toque no ecrã para iniciar.";
    });
}

function keepFullscreenLike(){
    // Fullscreen visual por CSS. requestFullscreen nem sempre existe no Android WebView.
    if(document.documentElement.requestFullscreen && !document.fullscreenElement){
        document.documentElement.requestFullscreen().catch(()=>{});
    } else if(document.documentElement.webkitRequestFullscreen){
        try{ document.documentElement.webkitRequestFullscreen(); }catch(e){}
    }
}

soundBtn.onclick = function(){
    video.muted = false;
    video.volume = 1;
    video.play().catch(()=>{});
    soundBtn.style.display = "none";
    keepFullscreenLike();
};

document.body.addEventListener("touchstart", function(){
    if(video.paused){
        video.play().catch(()=>{});
    }
    keepFullscreenLike();
}, {passive:true});

document.body.addEventListener("click", function(){
    if(video.paused){
        video.play().catch(()=>{});
    }
    keepFullscreenLike();
});

setInterval(function(){
    if(video.paused && currentChannel){
        video.play().catch(()=>{});
    }
}, 5000);
</script>
</body>
</html>
