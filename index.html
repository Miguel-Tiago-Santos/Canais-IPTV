<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>IPTV Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
html,body{
    margin:0;
    height:100%;
    background:#000;
    font-family:Arial;
    overflow:hidden;
}
#app{
    height:100vh;
    width:100vw;
    position:relative;
    background:#000;
    cursor:none;
}
#app:hover{
    cursor:default;
}
#player{
    width:100vw;
    height:100vh;
    background:#000;
}
video{
    width:100vw;
    height:100vh;
    object-fit:contain;
    background:#000;
}
#sidebar{
    position:absolute;
    left:0;
    top:0;
    width:340px;
    height:100vh;
    background:rgba(17,17,17,.96);
    color:white;
    overflow-y:auto;
    z-index:50;
    transform:translateX(-100%);
    transition:transform .35s ease;
}
#app:hover #sidebar{
    transform:translateX(0);
}
#sidebar h2{
    margin:0;
    padding:15px;
    background:#1c1c1c;
}
.channel{
    padding:12px;
    cursor:pointer;
    border-bottom:1px solid #222;
}
.channel:hover{
    background:#333;
}
.channel.active{
    background:#0078d7;
}
#status{
    position:absolute;
    top:15px;
    left:360px;
    background:rgba(0,0,0,.75);
    color:white;
    padding:12px 16px;
    border-radius:8px;
    z-index:70;
}
#soundBtn{
    position:absolute;
    bottom:25px;
    right:25px;
    padding:14px 22px;
    font-size:18px;
    background:#0078d7;
    color:white;
    border:0;
    border-radius:8px;
    cursor:pointer;
    display:none;
    opacity:0;
    z-index:80;
    transition:opacity .3s ease;
}
#app:hover #soundBtn.available{
    display:block;
    opacity:1;
}
</style>
</head>

<body>

<div id="app">

    <div id="sidebar">
        <h2>Canais IPTV</h2>
        <div id="channels"></div>
    </div>

    <div id="player">
        <div id="status">A carregar RTP 1...</div>
        <video id="video" autoplay playsinline controls></video>
        <button id="soundBtn">Ativar som</button>
    </div>

</div>

<script>
const playlistText = `
#EXTM3U

#EXTINF:-1 group-title="TV",RTP 1
https://streaming-live.rtp.pt/liverepeater/smil:rtp1HD.smil/playlist.m3u8

#EXTINF:-1 group-title="TV",RTP 2
https://streaming-live.rtp.pt/liverepeater/rtp2HD.smil/playlist.m3u8

#EXTINF:-1 group-title="TV",SIC
https://d1zx6l1dn8vaj5.cloudfront.net/out/v1/b89cc37caa6d418eb423cf092a2ef970/index.m3u8

#EXTINF:-1 group-title="TV",RTP Notícias
https://streaming-live.rtp.pt/liverepeater/smil:rtpnHD.smil/playlist.m3u8

#EXTINF:-1 group-title="TV",SIC Notícias
https://sicnot.live.impresa.pt/sicnot.m3u8

#EXTINF:-1 group-title="TV",CNN Brasil
https://d25usgadhphvwi.cloudfront.net/hls/main.m3u8

#EXTINF:-1 group-title="TV",Euronews PT
https://38cf202f635c4e6d9a9ecd1dc805222a.mediatailor.eu-west-1.amazonaws.com/v1/manifest/0547f18649bd788bec7b67b746e47670f558b6b2/production-LiveChannel-6572/aa7d84c5-ed1b-4706-aa89-11c525faf07d/5.m3u8

#EXTINF:-1 group-title="TV",ARTV
https://playout175.livextend.cloud/livenlin4/_definst_/2liveartvpub2/playlist.m3u8

#EXTINF:-1 group-title="TV",RTP Memória
https://streaming-live.rtp.pt/liverepeater/rtpmem.smil/playlist.m3u8

#EXTINF:-1 group-title="TV",Porto Canal
https://pull-live-156-1.global.ssl.fastly.net/pc5865dc25400thmb-ea6bf03b14fa318f7133/pc1-jhrgyuoqe5865db-68tkgb14fa318f7133f03.smil/playlist.m3u8
`;

const video = document.getElementById("video");
const channelsDiv = document.getElementById("channels");
const statusDiv = document.getElementById("status");
const soundBtn = document.getElementById("soundBtn");

let hls = null;
let channels = parseM3U(playlistText);

renderChannels();

const rtp1 = channels.find(c => c.name.toLowerCase().includes("rtp 1"));
playChannel(rtp1 || channels[0]);

function parseM3U(text){
    const lines = text.split(/\r?\n/);
    const result = [];
    let currentName = "Canal";

    for(let line of lines){
        line = line.trim();

        if(line.startsWith("#EXTINF")){
            const match = line.match(/,(.*)$/);
            currentName = match ? match[1].trim() : "Canal";
        }

        if(line.startsWith("http")){
            result.push({
                name: currentName,
                url: line
            });
        }
    }

    return result;
}

function renderChannels(){
    channelsDiv.innerHTML = "";

    channels.forEach(channel => {
        const div = document.createElement("div");
        div.className = "channel";
        div.innerText = channel.name;
        div.onclick = () => playChannel(channel);
        channelsDiv.appendChild(div);
    });
}

function playChannel(channel){
    document.querySelectorAll(".channel").forEach(el => {
        el.classList.toggle("active", el.innerText === channel.name);
    });

    statusDiv.style.display = "block";
    statusDiv.innerText = "A carregar: " + channel.name;

    soundBtn.classList.remove("available");
    soundBtn.style.display = "none";

    if(hls){
        hls.destroy();
        hls = null;
    }

    video.pause();
    video.removeAttribute("src");
    video.load();
    video.muted = false;

    if(Hls.isSupported()){
        hls = new Hls();
        hls.loadSource(channel.url);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, startVideo);

        hls.on(Hls.Events.ERROR, function(event, data){
            if(data.fatal){
                statusDiv.innerText = "Erro neste canal. Escolhe outro.";
            }
        });

    } else {
        video.src = channel.url;
        video.addEventListener("loadedmetadata", startVideo, { once:true });
    }
}

function startVideo(){
    video.play()
    .then(() => {
        statusDiv.style.display = "none";
        goFullscreen();
    })
    .catch(() => {
        video.muted = true;

        video.play().then(() => {
            statusDiv.style.display = "none";

            soundBtn.classList.add("available");

            goFullscreen();
        });
    });
}

soundBtn.onclick = () => {
    video.muted = false;
    video.volume = 1;
    video.play();

    soundBtn.classList.remove("available");
    soundBtn.style.display = "none";

    goFullscreen();
};

function goFullscreen(){
    if(!document.fullscreenElement){
        document.documentElement.requestFullscreen().catch(()=>{});
    }
}

document.body.addEventListener("click", () => {
    goFullscreen();
}, { once:true });
</script>

</body>
</html>
