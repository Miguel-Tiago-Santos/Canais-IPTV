<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>IPTV Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
html,body{margin:0;height:100%;background:#000;overflow:hidden;font-family:Arial}
#app{width:100vw;height:100vh;position:relative;cursor:none}
#app:hover{cursor:default}
video{width:100vw;height:100vh;object-fit:contain;background:#000}
#sidebar{position:absolute;left:0;top:0;width:340px;height:100vh;background:rgba(17,17,17,.96);color:white;overflow-y:auto;z-index:100;transform:translateX(-100%);transition:.35s}
#app:hover #sidebar{transform:translateX(0)}
#sidebar h2{margin:0;padding:15px;background:#1c1c1c}
.channel{padding:14px;border-bottom:1px solid #222;cursor:pointer}
.channel:hover{background:#333}
.channel.active{background:#0078d7}
#status{position:absolute;top:20px;left:20px;background:rgba(0,0,0,.85);color:white;padding:12px 18px;border-radius:8px;z-index:200}
#soundBtn{position:absolute;bottom:30px;right:30px;padding:14px 24px;font-size:18px;background:#0078d7;color:white;border:0;border-radius:8px;cursor:pointer;opacity:0;pointer-events:none;z-index:300}
#app:hover #soundBtn.available{opacity:1;pointer-events:auto}
</style>
</head>

<body>
<div id="app">
    <div id="sidebar">
        <h2>Canais</h2>
        <div id="channels"></div>
    </div>

    <div id="status">A carregar...</div>
    <video id="video" autoplay playsinline controls></video>
    <button id="soundBtn">🔊 Ativar Som</button>
</div>

<script>
const playlist = [
    {
        name:"Euronews PT",
        url:"https://38cf202f635c4e6d9a9ecd1dc805222a.mediatailor.eu-west-1.amazonaws.com/v1/manifest/0547f18649bd788bec7b67b746e47670f558b6b2/production-LiveChannel-6572/aa7d84c5-ed1b-4706-aa89-11c525faf07d/5.m3u8"
    },
    {
        name:"SIC",
        url:"https://d1zx6l1dn8vaj5.cloudfront.net/out/v1/b89cc37caa6d418eb423cf092a2ef970/index.m3u8"
    },
    {
        name:"TVI",
        url:"https://raw.githubusercontent.com/thomraider12/canaistvpt/main/m3u8s/tvi.m3u8"
    },
    {
        name:"Porto Canal",
        url:"https://pull-live-156-1.global.ssl.fastly.net/pc5865dc25400thmb-ea6bf03b14fa318f7133/smil:pc1-jhrgyuoqe5865db-68tkgb14fa318f7133f03.smil/playlist.m3u8"
    },
    {
        name:"ARTV",
        url:"https://playout175.livextend.cloud/livenlin4/_definst_/2liveartvpub2/playlist.m3u8"
    },
    {
        name:"FUEL TV Europe",
        url:"https://amg01074-fueltv-fueltvemeaen-rakuten-b6j62.amagi.tv/hls/amagi_hls_data_rakutenAA-fueltvemeaen/CDN/master.m3u8"
    },
    {
        name:"TV Cultura",
        url:"https://player-tvcultura.stream.uol.com.br/live/tvcultura.m3u8"
    },
    {
        name:"Kuriakos Cine",
        url:"https://w2.manasat.com/kcine/smil:kcine.smil/playlist.m3u8"
    },
    {
        name:"Kuriakos Kids",
        url:"https://w2.manasat.com/kkids/smil:kkids.smil/playlist.m3u8"
    },
    {
        name:"Kuriakos TV",
        url:"https://w1.manasat.com/ktv/smil:ktv.smil/playlist.m3u8"
    },
    {
        name:"TDM Macau PT",
        url:"https://globallive.tdm.com.mo/ch2/ch2.live/playlist.m3u8"
    }
];

const video = document.getElementById("video");
const channelsDiv = document.getElementById("channels");
const statusDiv = document.getElementById("status");
const soundBtn = document.getElementById("soundBtn");

let hls = null;

renderChannels();
playChannel(playlist[0]);

function renderChannels(){
    channelsDiv.innerHTML = "";

    playlist.forEach(channel => {
        const div = document.createElement("div");
        div.className = "channel";
        div.textContent = channel.name;
        div.onclick = () => playChannel(channel);
        channelsDiv.appendChild(div);
    });
}

function playChannel(channel){
    document.querySelectorAll(".channel").forEach(el => {
        el.classList.toggle("active", el.textContent === channel.name);
    });

    statusDiv.style.display = "block";
    statusDiv.textContent = "A carregar: " + channel.name;

    soundBtn.classList.remove("available");

    if(hls){
        hls.destroy();
        hls = null;
    }

    video.pause();
    video.removeAttribute("src");
    video.load();
    video.muted = false;

    if(Hls.isSupported()){
        hls = new Hls({
            enableWorker:true,
            lowLatencyMode:true
        });

        hls.loadSource(channel.url);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, startVideo);

        hls.on(Hls.Events.ERROR, function(event, data){
            if(data.fatal){
                statusDiv.textContent = "Erro neste canal. Escolhe outro.";
            }
        });
    } else {
        video.src = channel.url;
        video.addEventListener("loadedmetadata", startVideo, {once:true});
    }
}

function startVideo(){
    video.play()
    .then(() => {
        statusDiv.style.display = "none";
        goFullscreen();
    })
    .catch(() => {
        video.muted = true;
        video.play().then(() => {
            statusDiv.style.display = "none";
            soundBtn.classList.add("available");
            goFullscreen();
        });
    });
}

soundBtn.onclick = () => {
    video.muted = false;
    video.volume = 1;
    video.play();
    soundBtn.classList.remove("available");
    goFullscreen();
};

function goFullscreen(){
    if(!document.fullscreenElement){
        document.documentElement.requestFullscreen().catch(()=>{});
    }
}

document.body.addEventListener("click", () => {
    goFullscreen();
}, {once:true});
</script>
</body>
</html>
