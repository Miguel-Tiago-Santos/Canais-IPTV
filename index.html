<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>IPTV Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
    font-family:Arial, sans-serif;
}

#app{
    width:100vw;
    height:100vh;
    background:#000;
    position:relative;
    overflow:hidden;
}

video{
    position:absolute;
    inset:0;
    width:100vw;
    height:100vh;
    object-fit:contain;
    background:#000;
}

#sidebar{
    position:absolute;
    left:0;
    top:0;
    width:340px;
    max-width:85vw;
    height:100vh;
    background:rgba(17,17,17,.97);
    color:#fff;
    overflow-y:auto;
    z-index:1000;
    transform:translateX(-100%);
    transition:.25s;
}

#sidebar.open{
    transform:translateX(0);
}

#sidebar h2{
    margin:0;
    padding:15px;
    background:#1c1c1c;
}

.channel{
    padding:16px;
    border-bottom:1px solid #222;
    cursor:pointer;
    font-size:18px;
}

.channel.active{
    background:#0078d7;
}

#menuBtn{
    position:absolute;
    top:18px;
    right:18px;
    z-index:1100;
    background:#0078d7;
    color:white;
    border:0;
    border-radius:8px;
    padding:12px 16px;
    font-size:22px;
}

#status{
    position:absolute;
    top:18px;
    left:18px;
    right:85px;
    z-index:900;
    background:rgba(0,0,0,.85);
    color:white;
    padding:12px 16px;
    border-radius:8px;
    font-size:16px;
}

#openRtpBtn{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    z-index:950;
    display:none;
    background:#0078d7;
    color:#fff;
    border:0;
    border-radius:10px;
    padding:18px 26px;
    font-size:22px;
    cursor:pointer;
}
</style>
</head>

<body>
<div id="app">
    <video id="video" autoplay muted playsinline webkit-playsinline preload="auto"></video>

    <div id="sidebar">
        <h2>Canais</h2>
        <div id="channels"></div>
    </div>

    <div id="status">A carregar...</div>
    <button id="menuBtn">☰</button>
    <button id="openRtpBtn">Abrir RTP Play</button>
</div>

<script>
const playlist = [
    {
        name:"RTP 1",
        type:"external",
        url:"https://www.rtp.pt/play/direto/rtp1"
    },
    {
        name:"RTP 2",
        type:"external",
        url:"https://www.rtp.pt/play/direto/rtp2"
    },
    {
        name:"RTP Notícias",
        type:"external",
        url:"https://www.rtp.pt/play/direto/rtp3"
    },
    {
        name:"RTP Memória",
        type:"external",
        url:"https://www.rtp.pt/play/direto/rtpmemoria"
    },
    {
        name:"RTP Mundo",
        type:"external",
        url:"https://www.rtp.pt/play/direto/rtpinternacional"
    },
    {
        name:"RTP Madeira",
        type:"external",
        url:"https://www.rtp.pt/play/direto/rtpmadeira"
    },
    {
        name:"RTP Açores",
        type:"external",
        url:"https://www.rtp.pt/play/direto/rtpacores"
    },
    {
        name:"RTP África",
        type:"external",
        url:"https://www.rtp.pt/play/direto/rtpafrica"
    },
    {
        name:"RTP ZigZag",
        type:"external",
        url:"https://www.rtp.pt/play/zigzag/direto/tv"
    },
    {
        name:"SIC",
        type:"hls",
        url:"https://d1zx6l1dn8vaj5.cloudfront.net/out/v1/b89cc37caa6d418eb423cf092a2ef970/index.m3u8"
    },
    {
        name:"TVI",
        type:"hls",
        url:"https://raw.githubusercontent.com/thomraider12/canaistvpt/main/m3u8s/tvi.m3u8"
    },
    {
        name:"Porto Canal",
        type:"hls",
        url:"https://pull-live-156-1.global.ssl.fastly.net/pc5865dc25400thmb-ea6bf03b14fa318f7133/smil:pc1-jhrgyuoqe5865db-68tkgb14fa318f7133f03.smil/playlist.m3u8"
    },
    {
        name:"ARTV",
        type:"hls",
        url:"https://playout175.livextend.cloud/livenlin4/_definst_/2liveartvpub2/playlist.m3u8"
    },
    {
        name:"Euronews PT",
        type:"hls",
        url:"https://38cf202f635c4e6d9a9ecd1dc805222a.mediatailor.eu-west-1.amazonaws.com/v1/manifest/0547f18649bd788bec7b67b746e47670f558b6b2/production-LiveChannel-6572/aa7d84c5-ed1b-4706-aa89-11c525faf07d/5.m3u8"
    },
    {
        name:"FUEL TV Europe",
        type:"hls",
        url:"https://amg01074-fueltv-fueltvemeaen-rakuten-b6j62.amagi.tv/hls/amagi_hls_data_rakutenAA-fueltvemeaen/CDN/master.m3u8"
    },
    {
        name:"TDM Macau PT",
        type:"hls",
        url:"https://globallive.tdm.com.mo/ch2/ch2.live/playlist.m3u8"
    },
    {
        name:"TV Cultura",
        type:"hls",
        url:"https://player-tvcultura.stream.uol.com.br/live/tvcultura.m3u8"
    }
];

const video = document.getElementById("video");
const channelsDiv = document.getElementById("channels");
const sidebar = document.getElementById("sidebar");
const menuBtn = document.getElementById("menuBtn");
const statusDiv = document.getElementById("status");
const openRtpBtn = document.getElementById("openRtpBtn");

let hls = null;
let currentExternalUrl = "";

renderChannels();
playChannel(playlist[9]); // abre SIC por defeito, porque os m3u8 RTP diretos estão a devolver 204

menuBtn.onclick = function(){
    sidebar.classList.toggle("open");
};

openRtpBtn.onclick = function(){
    if(currentExternalUrl){
        window.location.href = currentExternalUrl;
    }
};

function renderChannels(){
    channelsDiv.innerHTML = "";

    playlist.forEach(channel => {
        const div = document.createElement("div");
        div.className = "channel";
        div.textContent = channel.name;
        div.onclick = function(){
            sidebar.classList.remove("open");
            playChannel(channel);
        };
        channelsDiv.appendChild(div);
    });
}

function setActive(name){
    document.querySelectorAll(".channel").forEach(el => {
        el.classList.toggle("active", el.textContent === name);
    });
}

function stopHls(){
    if(hls){
        hls.destroy();
        hls = null;
    }

    video.pause();
    video.removeAttribute("src");
    video.load();
}

function playChannel(channel){
    setActive(channel.name);
    openRtpBtn.style.display = "none";
    currentExternalUrl = "";

    if(channel.type === "external"){
        stopHls();

        statusDiv.style.display = "block";
        statusDiv.textContent = channel.name + " abre pela página oficial RTP Play.";

        currentExternalUrl = channel.url;
        openRtpBtn.textContent = "Abrir " + channel.name;
        openRtpBtn.style.display = "block";

        // Em WebView/Android, a forma mais fiável é navegar diretamente.
        // Em alguns WebViews, isto só funciona após toque; por isso fica também o botão.
        try{
            window.location.href = channel.url;
        }catch(e){}

        return;
    }

    statusDiv.style.display = "block";
    statusDiv.textContent = "A carregar: " + channel.name;

    stopHls();

    video.style.display = "block";
    video.muted = true;
    video.volume = 0;

    if(window.Hls && Hls.isSupported()){
        hls = new Hls({
            enableWorker:false,
            lowLatencyMode:false,
            backBufferLength:30,
            maxBufferLength:30,
            manifestLoadingTimeOut:15000,
            levelLoadingTimeOut:15000,
            fragLoadingTimeOut:20000
        });

        hls.loadSource(channel.url);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, function(){
            video.play()
                .then(function(){
                    statusDiv.style.display = "none";
                    goFullscreenSafe();
                })
                .catch(function(){
                    statusDiv.textContent = "Toque no ecrã para iniciar.";
                });
        });

        hls.on(Hls.Events.ERROR, function(event, data){
            if(data && data.fatal){
                statusDiv.style.display = "block";
                statusDiv.textContent = "Erro neste canal.";
            }
        });

    } else {
        video.src = channel.url;

        video.play()
            .then(function(){
                statusDiv.style.display = "none";
                goFullscreenSafe();
            })
            .catch(function(){
                statusDiv.textContent = "Toque no ecrã para iniciar.";
            });
    }
}

function goFullscreenSafe(){
    const el = document.documentElement;

    if(el.requestFullscreen && !document.fullscreenElement){
        el.requestFullscreen().catch(function(){});
    } else if(el.webkitRequestFullscreen){
        try{ el.webkitRequestFullscreen(); }catch(e){}
    }
}

document.body.addEventListener("click", function(){
    goFullscreenSafe();

    if(video.paused && openRtpBtn.style.display === "none"){
        video.play().catch(function(){});
    }
});

document.body.addEventListener("touchstart", function(){
    goFullscreenSafe();

    if(video.paused && openRtpBtn.style.display === "none"){
        video.play().catch(function(){});
    }
}, {passive:true});
</script>
</body>
</html>
